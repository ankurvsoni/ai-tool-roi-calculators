<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI ROI Toolkit App</title><style>body{font-family:Inter,system-ui;margin:0;background:#f7f7f7;color:#222}.wrap{max-width:980px;margin:0 auto;padding:24px}.box{background:#fff;border:1px solid #eaeaea;border-radius:14px;padding:16px;margin:12px 0}.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}input,select{width:100%;padding:10px;border:1px solid #ddd;border-radius:10px;margin:6px 0 10px}.kpi{font-size:28px;font-weight:700}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px}.btn{background:#ff385c;color:#fff;border:none;border-radius:999px;padding:10px 14px;cursor:pointer} .muted{color:#666}@media(max-width:760px){.row{grid-template-columns:1fr}}</style></head><body><main class="wrap"><h1>AI ROI Toolkit App</h1><p class="muted">Offline, self-contained calculator for non-technical users.</p><div class="box"><label>Scenario</label><select id="scenario"><option value="0.7">Conservative</option><option value="1" selected>Base</option><option value="1.3">Aggressive</option></select><div class="row"><div><label>Team size</label><input id="team" type="number" value="5"><label>Monthly tool cost ($)</label><input id="cost" type="number" value="10"><label>Hours saved per person / month</label><input id="hours" type="number" value="8"></div><div><label>Hourly rate ($)</label><input id="rate" type="number" value="40"><label>Setup hours (one-time)</label><input id="setup" type="number" value="6"><label>Extra monthly costs ($)</label><input id="extra" type="number" value="0"></div></div><button class="btn" onclick="run()">Calculate</button></div><div class="grid"><div class="box"><div class="muted">Monthly savings</div><div class="kpi" id="savings">$0</div></div><div class="box"><div class="muted">ROI %</div><div class="kpi" id="roi">0%</div></div><div class="box"><div class="muted">Payback (months)</div><div class="kpi" id="payback">0</div></div></div><div class="box"><button class="btn" onclick="downloadMemo()">Download Decision Memo</button></div></main><script>function run(){const m=parseFloat(document.getElementById('scenario').value);const t=+team.value,c=+cost.value,h=+hours.value,r=+rate.value,s=+setup.value,e=+extra.value;const hs=h*m;const savings=(t*hs*r)-(c+e);const roi=(savings/Math.max(c+e,1))*100;const pay=(s*r)/Math.max(savings,1);document.getElementById('savings').innerText='$'+Math.round(savings);document.getElementById('roi').innerText=roi.toFixed(1)+'%';document.getElementById('payback').innerText=pay.toFixed(1);} function downloadMemo(){run();const txt=`AI ROI Decision Memo
Monthly savings: ${document.getElementById('savings').innerText}
ROI: ${document.getElementById('roi').innerText}
Payback: ${document.getElementById('payback').innerText}`;const b=new Blob([txt],{type:'text/plain'});const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='roi-decision-memo.txt';a.click();URL.revokeObjectURL(u);} run();</script></body></html>
